name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.7,<1.0"

      - name: Ruff check
        run: ruff check src/ tests/ api/ streamlit_app/

      - name: Ruff format check
        run: ruff format --check src/ tests/ api/ streamlit_app/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        run: mypy src/mlops_forecast/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Stub credentials
        run: |
          mkdir -p conf/local
          cp conf/local/credentials.yml.example conf/local/credentials.yml

      - name: Run tests
        run: pytest tests/ -v --cov=src/mlops_forecast --cov-report=xml -m "not slow"
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlruns/test.db"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  kedro-smoke:
    name: Kedro pipeline smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Stub credentials
        run: |
          mkdir -p conf/local
          cp conf/local/credentials.yml.example conf/local/credentials.yml

      - name: Verify pipeline registry
        # `kedro pipeline list` was removed in 0.19; the equivalent in 0.19
        # is `kedro registry list`.
        run: kedro registry list

      - name: Verify catalog
        run: kedro catalog list
